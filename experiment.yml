# Experiment configuration for agents.py
# Run with: uv run python3 -m src.agents
# Or with a custom config: uv run python3 -m src.agents --config path/to/experiment.yml
# Any field can also be overridden via CLI args, e.g. --model_id gemma4:31b --runs 3

model:
  # Ollama (via LiteLLM)
  provider: ollama              # ollama | huggingface
  model_id: devstral-small-2:24b
  temperature: 0.8

agent:
  type: tool_calling            # tool_calling | code

experiment:
  runs: 1                       # number of times to repeat the full task loop
  use_overrides: false          # if true, use per-task override prompts where present
  persist_context: true         # if true, keep the temp working directory after each run
  use_lite_requirements: false  # if true, use additional_requirements_lite from task.yml instead of additional_requirements
  tasks:                        # list of task numbers to run; leave empty [] to run all                   