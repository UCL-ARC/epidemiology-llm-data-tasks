task_id: 1
task_type: data_cleaning_r
override: |
  You have access to raw survey datasets on a cohort study followed up at multiple ages. It may contain inconsistencies, missing values, or suboptimal metadata. Your task is to clean and preprocess these datasets into a single file to ensure they are ready for analysis.
  
  Follow all instructions:

  1. **File Loading**:
     - Ensure when you load the input files you append the dir "data/input/" this is where they are stored.
     - Load each dataset into a separate object and merge using full_join by the ID variable.
     - The input files are tab-delimited (.tab) text files. Use `readr::read_delim()` with `delim = "\t"` to load them. 
     - Load each file explicitly by name from the metadata.
     
  2. **Variable Naming Conventions**:
     - Use the exact ID variable name from source data (e.g., NSID) - do NOT create or rename to generic "id".
     - All variable names must be short, descriptive, and lowercase.
     - Common abbreviations: eth = ethnicity, lang = language, sori = sexual orientation, partnr = partnership/marital status, reg = region, educaim = educational aims/qualifications being studied, educ = educational qualifications attained, ecoact = economic activity.
     - For age-specific variables: append age as numeric suffix (e.g., ecoact17 = economic activity at age 17).
     - For parental variables: include parent and age in the suffix (e.g., ecoactdtma14 = mother's detailed economic activity at age 14; ecoactdtpa14 = father's detailed economic activity at age 14).

  3. **Standard Missing-Value Codes**:
     Use these codes for ALL variables:
     - -9 = Refusal
     - -8 = Don't know/insufficient information
     - -1 = Item not applicable
     - -3 = Not asked at the fieldwork stage/participated/interviewed
     - -2 = Schedule not applicable/Script error/information lost
     - -7 = Prefer not to say
     - Any Null value to be coded as -3 (Not asked at the fieldwork stage/participated/interviewed) to distinguish from explicit missing codes.

  4. **Response Category Harmonization**:
     - When the SAME construct is measured across ages with DIFFERENT response categories, harmonize them into a common coding scheme.
     - Create age-specific variables that ALL use the SAME conceptual categories where possible.
     - Where harmonization is not possible (e.g., substantially different instruments like income bands), provide multiple variables with clearly labelled, age-specific categories.
     - Preserve as much conceptual detail as possible while maintaining comparability across ages.

  5. **Dual-Level Variables** (collapsed + detailed):
     - For variables where later waves have more detailed categories than earlier waves (e.g., marital status or adult economic activity), create both:
       a. Collapsed harmonised variables with consistent categories across all ages to enable temporal comparisons.
       b. Detailed age-specific adult variables that preserve the full granularity of later measurements.

  6. **Explicit Recoding for Different Measurement Approaches**:
     - When measurement approaches differ substantially across waves (e.g., different employment/activity classifications at each age), explicitly recode each wave into a shared small set of mutually exclusive categories (e.g., paid work, training, education, unemployed, looking after home, other) using clear logical mappings.

  7. **Time-Invariant vs Time-Varying Characteristics**:
     - For **time-invariant** or stable characteristics (e.g., sex, ethnicity, language spoken at home, parental education):
       * Create a single consolidated variable.
       * Prioritisation strategy depends on the variable:
         - For characteristics expected to be stable and established early (e.g., ethnicity, language): prioritise the earliest valid response.
         - For characteristics that may be corrected or updated over time (e.g., sex): prioritise the most recent valid response.
       * Only use positive values in the prioritisation logic; include missing codes as fallback values when no positive values exist.
     
     - For **time-varying** characteristics (e.g., economic activity, employment status, education, relationship status, geographical location):
       * Retain age-specific variables rather than creating a single consolidated measure.
       * Preserve temporal variation for longitudinal analysis.

  8. **Derived Categorical Variables**:
     - When creating derived categorical variables from more detailed measures (e.g., collapsing many activity states into a 6-category scheme), apply the transformation consistently across all ages and convert the result to a labeled factor.

  9. **Missing Value Code Harmonization**:
     - Convert wave-specific negative codes to the standard missing-value codes defined in instruction 3.
     - Multiple wave-specific codes may map to the same standard code.
     - Follow exact mappings provided in metadata.
     - Do NOT blanket-remap all negative codes to a single value (e.g., all to -9). Each wave-specific code has a distinct meaning — map it to the standard code that best matches that meaning.

  10. **Factor Variables and Labels**:
      - When recoding categorical variables, use factor variables with explicit labels for both valid categories and all missing value codes to preserve metadata.

  11. **Parental Economic Activity**:
      - For parental economic activity, retain separate detailed variables for mothers and fathers at each age.
      - Harmonise to a common detailed classification (full-time, part-time, unemployed, training, education, home, retired, sick/disabled, other) with age-specific suffixes.

  12. **Package Requirements**:
      - Use ONLY standard R packages: haven, dplyr, purrr, labelled, readr.
      - Load packages at the start of the script using library().

  13. **Output Requirements**:
      - Your R script must output one single cleaned csv named data/output/cleaned_data.csv.

  14. **Variables to Include in Output**:
      - Include the ID variable from source data.
      - Explicitly output only the derived variables that were created during the cleaning process.
      - Do NOT include intermediate wave-specific variables unless they are the final output.

  15. **Execution**:
      - You must run your R script after generating it.
      - IMPORTANT: If your R script fails, read the error message carefully, fix the script, and try again. Never return an error message as your final answer.

  Produce your script in R.
  
  Here is the appropriate metadata for the task:

  {metadata}