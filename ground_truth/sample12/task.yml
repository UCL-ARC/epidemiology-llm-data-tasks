task_id: 1
task_type: data_cleaning_r
override: |
  You have access to raw survey datasets from a longitudinal cohort study followed up at multiple ages. Your task is to clean and harmonise NS-SEC occupational class variables only and produce a single cleaned file ready for analysis.

  Follow all instructions:

  1. When loading input files, always prepend the directory data/input/.
  2. Use only standard R packages: haven, dplyr, purrr, labelled, readr.
  3. Load the datasets and merge all files using full_join by NSID
  4. Rename and retain only the following age-specific occupational class variables:
    - nssec17, nssec18, nssec19, nssec20, nssec25, nssec32 using the convention nssec + age suffix.
  5. Harmonise all wave-specific negative missing codes to the standard scheme (-9, -8, -7, -3, -2, -1) and retain missing codes as explicit factor levels.
  6. For each age-specific NS-SEC variable:
    - Accept only valid categories 1–17 as occupational classes.
    - Recode invalid or fractional values to missing.
    - Recode NA to -3 (not asked/interviewed).
    - Map wave-specific negatives (e.g. -100, -97, -999, -998, -997, -995, -94, -92, -91, -99, -98, -996) to the standard missing scheme.
  7. At age 25, explicitly derive the full-time student category (15) using concurrent economic activity information.
  8. Retain detailed 17-category NS-SEC classifications at every age.
     Do not collapse, summarise, or harmonise across ages.
  9. Convert all NS-SEC variables to labelled factor variables with explicit labels for:
    - Categories 1–17
    - All standard missing codes
  10. Do not create any additional variables, harmonised summaries, or consolidated measures.
  11. Explicitly output only:
    - NSID
    - nssec17, nssec18, nssec19, nssec20, nssec25, nssec32
  12. Write exactly one CSV file named data/output/cleaned_data.csv.
  13. Produce a complete, runnable R script that follows these instructions using the provided metadata.
  14. You must run your R script.
  
  Here is the appropriate metadata for the task:

  {metadata}
