task_id: 1
task_type: data_cleaning_r
override: |
  You have access to raw survey datasets from a longitudinal cohort study. Your task is to clean and harmonise parental NS-SEC occupational class variables across waves and output a single cleaned dataset.

  Follow all instructions:

  1. When loading input files, always prepend the directory data/input/.

  2. Use short, descriptive, lowercase variable names. For parental occupational class use:
    nssecma14–nssecma18 for mothers and
    nssecpa14–nssecpa18 for fathers.

  3. Load and merge all waves by NSID using full joins

  4. Retain only parental NS-SEC variables and rename them to nssecma14–nssecma18 and nssecpa14–nssecpa18.

  5. Recode each wave into the harmonised 17-category NS-SEC classification.
   - Collapse detailed subcategories by taking the integer part.
   - Accept only categories 1–17 as valid occupational classes.
   - Recode fractional or invalid values to missing.

  6. Harmonise all wave-specific negative codes
   - -999 and -94 → -2 (Script error / information lost)
   - -99, -98, and NA → -3 (Not asked / not interviewed)
   Preserve standard missing codes:
   -9 Refusal, -8 Don’t know, -7 Prefer not to say, -3 Not asked/interviewed, -2 Script error/lost, -1 Not applicable.

  7. Retain separate detailed age-specific variables for mothers and fathers.
    Do not collapse across ages and do not create consolidated measures.

  8. Convert all NS-SEC variables to labelled factor variables with explicit labels for:
    categories 1–17 and all standard missing codes.

  9. Output only the following variables:
      NSID,
      nssecma14, nssecpa14,
      nssecma15, nssecpa15,
      nssecma16, nssecpa16,
      nssecma17, nssecpa17,
      nssecma18, nssecpa18.

  10. Use only standard R packages: haven, dplyr, purrr, labelled, readr.

  11. Write exactly one CSV file named data/output/cleaned_data.csv.

  12. Produce a complete runnable R script and run it.
  
  Here is the appropriate metadata for the task:

  {metadata}

