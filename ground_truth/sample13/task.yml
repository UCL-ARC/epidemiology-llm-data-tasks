task_id: 1
task_type: data_cleaning_r
override: |
  You have access to raw survey datasets from a longitudinal cohort study. Your task is to clean and harmonise parental NS-SEC occupational class variables across waves and output a single cleaned dataset.

  Follow all instructions:

  1. When loading input files, always prepend the directory data/input/.

  2. Use short, descriptive, lowercase variable names. For parental occupational class use:
    nssecma14–nssecma18 for mothers and
    nssecpa14–nssecpa18 for fathers.

  3. Use standard missing-value codes:
    -9 Refusal, -8 Don’t know, -7 Prefer not to say, -3 Not asked/interviewed, -2 Script error/lost, -1 Not applicable.

  4. Load and merge all waves by NSID using full joins:
    wave_one_lsype_family_background_2020.tab
    wave_two_lsype_family_background_2020.tab
    wave_three_lsype_family_background_2020.tab
    wave_four_lsype_family_background_2020.tab
    wave_five_lsype_family_background_2020.tab

  5. Retain only parental NS-SEC variables and rename them to nssecma14–nssecma18 and nssecpa14–nssecpa18.

  6. Recode each wave into the harmonised 17-category NS-SEC classification.
    Accept only categories 1–17 as valid occupational classes.
    Recode fractional or invalid values to missing.

  7. Harmonise all wave-specific negative codes
    (-100, -97, -999, -998, -997, -995, -94, -92, -91, -99, -98, -996)
    to the standard missing scheme.

  8. Retain separate detailed age-specific variables for mothers and fathers.
    Do not collapse across ages and do not create consolidated measures.

  9. Convert all NS-SEC variables to labelled factor variables with explicit labels for:
    categories 1–17 and all standard missing codes.

  10. Output only the following variables:
      NSID,
      nssecma14, nssecpa14,
      nssecma15, nssecpa15,
      nssecma16, nssecpa16,
      nssecma17, nssecpa17,
      nssecma18, nssecpa18.

  11. Use only standard R packages: haven, dplyr, purrr, labelled, readr.

  12. Write exactly one CSV file named data/output/cleaned_data.csv.

  13. Produce a complete runnable R script and run it.

  Here is the appropriate metadata for the task:

  {metadata}

