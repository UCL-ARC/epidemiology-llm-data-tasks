task_id: 1
task_type: data_cleaning_r
override: |
  You have access to raw survey datasets on a cohort study followed up at multiple ages. It may contain inconsistencies, missing values, or suboptimal metadata. Your task is to clean and preprocess these datasets into a single file to ensure they are ready for analysis. 
  Follow all instructions:

  1. Ensure when you load the input files you append the dir "data/input/" this is where they are stored.
  2. Rename variables. All variable names are short, descriptive, and lowercase (e.g., eth = ethnicity, lang = language, sori = sexual orientation, partnr = partnership/marital status, reg = region, educaim = educational aims/qualifications being studied, educ = educational qualifications attained, hown = housing tenure/homeownership). Age at measurement is appended as a numeric suffix (e.g., hown25 = housing tenure at age 25). For detailed versions of collapsed variables, append "dtl" after the variable name (e.g., educdtlma = detailed maternal educational qualifications, educadtl32 = detailed academic qualifications at age 32). For measures during adolescence/teenage years that have both detailed and collapsed versions, append "teen" before the age suffix for detailed versions (e.g., hownteen14 = detailed housing tenure at age 14). Use suffixes to distinguish characteristics of different family members (e.g., ma = mother, pa = father). Use prefixes to distinguish different aspects of the same concept (e.g., regub = urban/rural classification, regov = government office region, educa = academic qualifications, educv = vocational qualifications).
  3. Use standard missing-value codes (minus values) for all variables e.g., -9 = Refusal, -8 = Don't know/insufficient information, -1 = Item not applicable, -3 = Not asked at the fieldwork stage/participated/interviewed, -2 = Schedule not applicable/Script error/information lost, -7 = Prefer not to say
  4. To support analyses across time, derive consistent response categories where possible at different ages. When identical response categories existed across ages, retain them unchanged. When categories differ, collapse or re-map them to a common scheme. Where using the same response categories is not possible (e.g., substantially different instruments, such as parental income collected with different bands), provide multiple variables with clearly labelled, age-specific categories.
  5. For variables where later waves have more detailed categories than earlier waves (e.g., marital status that distinguishes civil partnerships in later waves but not earlier ones, or educational qualifications with granular categories at later ages), OR where earlier waves have more detailed categories than later waves (e.g., housing tenure with detailed rental subcategories in adolescence but broader categories in adulthood), create both: (a) collapsed harmonised variables with consistent categories across all ages to enable temporal comparisons, and (b) detailed age-specific variables that preserve the full granularity where available for nuanced analysis.
  6. When measurement approaches differ substantially across waves (e.g., a single categorical variable in early waves vs. multiple binary indicators in later waves, or pre-computed derived variables vs. raw indicators, or multiple separate variables capturing different dimensions vs. a single combined variable), derive consistent categories by: (a) directly recoding single categorical variables and derived variables, (b) applying logical rules to multiple binary indicators to assign participants to mutually exclusive categories, (c) combining information from multiple related variables using conditional logic. When both derived variables and binary indicators are available, use both sources to maximise coverage and accuracy.
  7. When creating detailed categorical variables from sets of mutually exclusive binary indicators (e.g., specific qualification types), identify which single category applies to each participant by checking which indicator equals 1, and handle cases where all indicators are 0, 2 (not selected), -1, or missing appropriately.
  8. For characteristics of family members or household context measured at multiple points during adolescence (e.g., parental education, parental occupation, housing tenure during teenage years), create single consolidated variables rather than retaining age-specific measures when the characteristic is relatively stable, OR retain age-specific measures when the characteristic may change over time (e.g., housing tenure can change year-to-year). The prioritisation strategy for consolidated variables may differ by variable and family member based on data quality and measurement timing.
  9. For variables measuring related but distinct geographical concepts (e.g., urban/rural classification, government office region, country of residence), retain all age-specific measures rather than attempting to harmonise across different geographical dimensions.
  10. When creating derived categorical variables from more detailed measures (e.g., collapsing multiple location categories into a binary UK/abroad indicator, or deriving qualification levels from binary indicators or detailed categories, or combining rental subtypes into a broader "rent" category), apply the transformation consistently and convert the result to a labeled factor.
  11. When harmonising missing value codes across waves, convert wave-specific negative codes (e.g., -100, -97, -999, -998, -997, -995, -94, -92, -91, -99) to the standard missing-value codes defined in instruction 3. Multiple wave-specific codes may map to the same standard code (e.g., -100 and -97 may both map to -3).
  12. For time-invariant or stable characteristics (e.g., sex, ethnicity, language spoken at home, parental education), create a single consolidated variable. The prioritisation strategy depends on the variable: for characteristics expected to be stable and established early (e.g., ethnicity, language), prioritise the earliest valid response; for characteristics that may be corrected or updated over time (e.g., sex), prioritise the most recent valid response. Only use positive values in the prioritisation logic; include missing codes as fallback values when no positive values exist.
  13. For time-varying characteristics that may legitimately change over the life course (e.g., sexual orientation, relationship status, employment, geographical location, educational activities, qualifications attained, housing tenure), retain age-specific variables rather than creating a single consolidated measure, to preserve the temporal variation for longitudinal analysis.
  14. When recoding categorical variables, use factor variables with explicit labels for both valid categories and all missing value codes to preserve metadata.
  15. Use only standard R packages (haven, dplyr, purrr, here, labelled, readr are acceptable).
  16. Your R script must output one single cleaned csv named data/output/cleaned_data.csv
  17. Explicitly output only the derived variables that were created during the cleaning process to the csv (do not include intermediate wave-specific variables unless they are the final output).
  18. You must run your R script.
        
  Produce your script in R.
  Here is the appropriate metadata for the task:

  {metadata}