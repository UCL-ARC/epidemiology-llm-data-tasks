task_id: 1
task_type: data_cleaning_r
override: |
  You have access to raw survey datasets on a cohort study followed up at multiple ages. Your task is to clean and preprocess these datasets into a single file ready for analysis. Follow these instructions precisely:

  1. **Package management**:
     - Required packages: haven, dplyr, purrr, labelled, readr.

  2. **File Loading**:
     - Ensure when you load the input files you append the dir "data/input/" this is where they are stored.

  3. **Variable derivation**:
     - After merging, create **all derived variables**.
     - Create first the detailed adolescent variables (`hownteen14-20`), preserving full granularity where available.
     - Then create collapsed, harmonized variables for all ages (`hown14-20, hown25, hown32`), using consistent categories.
     - Do not create additional adult detailed variables (no `hownadtl25` or `hownadtl32`).

  4. **Handling multiple indicators**:
     - For waves with multiple binary indicators (e.g., W5Hous12BHH, W5Hous12CHH), combine them into single categorical variables.
     - Follow exact mappings from metadata; do not use catch-all TRUE clauses.

  5. **Missing values**:
     - Use the following standard codes consistently:
       - -2 = script error / information lost
       - -3 = not asked / participated / interviewed
       - -1 = item not applicable
       - -8 = don't know / insufficient information
       - -9 = refusal
     - Map all wave-specific codes to these standard codes according to the metadata.

  6. **Factor labeling**:
     - For detailed adolescent variables (`hownteen14-20`), use long descriptive labels, e.g.:
       "Owned outright", "Being bought on a mortgage/bank loan", "Shared ownership (owns & rents property)", "Rented from a Council or New Town", "Rented from a Housing Association", "Rented privately", "Rent free", "Some other arrangement", "Item not applicable", "Script error/information lost", "Not asked at the fieldwork stage/participated/interviewed", "Don’t know/insufficient information", "Refusal".
     - For collapsed variables (`hown14-20, hown25, hown32`), use descriptive labels like:
       "Owned outright", "Owned, buying with help of mortgage/loan", "Part rent, part mortgage", "Rent it", "live rent-free", "Other", "Item not applicable", "Script error/information lost", "Not asked at the fieldwork stage/participated/interviewed", "Don’t know/insufficient information", "Refusal".

  7. **Output**:
     - Write the cleaned dataset to a single CSV using base R: `write.csv(cleaned_data, "data/output/cleaned_data.csv", row.names = FALSE)`.

  8. **Variables to include in final output**:
     - Keep only NSID, all collapsed age-specific variables (`hown14-20, hown25, hown32`), and all detailed adolescent variables (`hownteen14-20`).
     - Do not include raw source variables (e.g., W5Hous12BHH).

  9. **General rules**:
     - Merge first, recode later.
     - Process all waves and ages present in the metadata.
     - Follow metadata precisely for mappings, variable names, and missing value codes.

  10. Produce a complete runnable R script and run it.

  Here is the appropriate metadata for the task:

  {metadata}

