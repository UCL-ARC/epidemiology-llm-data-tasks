task_id: 1
task_type: data_cleaning_r
override: |
  You have access to raw survey datasets from a longitudinal cohort study. Your task is to clean and harmonise income band variables measured at different ages and output a single cleaned dataset.

  Follow all instructions:

  1. When loading input files, always prepend the directory data/input/.

  2. Use short, descriptive, lowercase variable names with age suffixes:
    inc25 for income at age 25 and inc32 for income at age 32.

  3. Use standard missing-value codes:
    -9 Refusal, -8 Don’t know/insufficient information, -3 Not asked/interviewed, -2 Script error/lost, -1 Not applicable.

  4. Load and merge the following files by NSID using full joins:
    wave_one_lsype_young_person_2020.tab
    wave_four_lsype_young_person_2020.tab
    ns8_2015_derived.tab
    ns9_2022_derived_variables.tab

  5. Retain only the income variables from waves 8 and 9 and rename them to inc25 and inc32.

  6. Recode all NA values and wave-specific negative codes to the standard missing scheme.

  7. Because income bands differ across ages, retain separate age-specific variables and do not attempt to collapse or harmonise categories across ages.

  8. Convert each income variable to a labelled factor with explicit labels for:
    all substantive income categories and all standard missing codes.

  9. Do not create a consolidated income variable across waves.

  10. Output only the following variables:
      NSID, inc25, inc32.

  11. Use only standard R packages: haven, dplyr, purrr, here, labelled, readr.

  12. Write exactly one CSV file named data/output/cleaned_data.csv.

  13. Produce a complete runnable R script and run it.

  Here is the appropriate metadata for the task:

  {metadata}
