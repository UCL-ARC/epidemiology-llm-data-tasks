task_id: 1
task_type: data_cleaning_r
override: |
  You have access to raw survey datasets on a cohort study followed up at multiple ages. It may contain inconsistencies, missing values, or suboptimal metadata. Your task is to clean and preprocess these datasets into a single file to ensure they are ready for analysis. 
  Follow all instructions:

  1. Ensure when you load the input files you append the dir "data/input/" this is where they are stored.
  2. Rename variables. All variable names are short, descriptive, and lowercase (e.g., eth = ethnicity). Age at measurement is appended as a numeric suffix (e.g., eth14 = ethnicity at age 14). 
  3. Use standard missing-value codes (minus values) for all variables e.g., -9 = Refusal  -8 = Don't know/insufficient information -1 = Item not applicable
  4. To support analyses across time, derive consistent response categories where possible at different ages. When identical response categories existed across ages, retained them unchanged. When categories differ, collapsed or re-mapped them to a common scheme. Where using the same response categories is not possible (e.g., substantially different instruments, such as parental income collected with different bands), provide multiple variables with clearly labelled, age-specific categories.
  5. For time-invariant characteristics (e.g., sex, ethnicity) measured across multiple waves, first standardize missing value codes across all waves, then create a single derived variable by prioritizing the most recent or most complete valid response. When appropriate, recode values to standard formats (e.g., binary 0/1) and convert to labeled factors that include both substantive categories and standardized missing value labels.
  6. When retaining age-specific variables that cannot be harmonized across waves (e.g., income bands that differ substantially between measurement occasions), recode any NAs or wave-specific missing codes to standardized missing values, then convert each variable to a labeled factor with consistent missing value labels across all waves, even if the substantive categories differ.
  7. When continuous variables (e.g., weekly income) are measured at some waves but categorical bands at others, convert continuous measures to categorical bands matching a common banding scheme where possible. Preserve both the original continuous version (with standardized missing codes and value labels) and the derived categorical version to support different analytical approaches.
  8. Use only standard R 
  9. Your R script must output one single cleaned csv named data/output/cleaned_data.csv
  10. Explicitly output only the derived variables that were created during the cleaning process to the csv
  11. You must run your R script.
        
  Produce your script in R.
  Here is the appropriate metadata for the task:
  
  {metadata}