task_id: 1
task_type: data_cleaning_r
override: |
  You have access to raw survey datasets from a longitudinal cohort study. Your task is to clean and harmonise area deprivation score variables measured at multiple ages and output a single cleaned dataset.

  Follow all instructions:

  1. When loading input files, always prepend the directory data/input/.

  2. Use short, descriptive, lowercase variable names with age suffixes:
    imd15, imd16, imd32.

  3. Use standard missing-value codes:
    -9 Refusal, -8 Don’t know/insufficient information, -3 Not asked/interviewed, -2 Script error/lost, -1 Not applicable.

  4. Load and merge the following files by NSID using full joins:
    wave_one_lsype_young_person_2020.tab
    wave_two_lsype_family_background_2020.tab
    wave_three_lsype_family_background_2020.tab
    wave_four_lsype_young_person_2020.tab
    ns9_2022_derived_variables.tab

  5. Retain only the deprivation score variables and rename them to imd15, imd16, and imd32.

  6. Recode all NA values and wave-specific missing codes to the standard missing scheme:
    -94 to -8 and NA to -3.

  7. Because deprivation scores are continuous and measured on the same scale, retain them as numeric continuous variables and do not create categorical bands or consolidated measures.

  8. Convert each deprivation variable to a labelled numeric variable using labelled(), with explicit labels for all standard missing codes.

  9. Do not collapse across ages and do not create a single combined deprivation variable.

  10. Output only the following variables:
      NSID, imd15, imd16, imd32.

  11. Use only standard R packages: haven, dplyr, purrr, labelled, readr.

  12. Write exactly one CSV file named data/output/cleaned_data.csv.

  13. Produce a complete runnable R script and run it.

  Here is the appropriate metadata for the task:

  {metadata}
