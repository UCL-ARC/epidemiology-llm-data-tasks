task_id: 1
task_type: data_cleaning_r
override: |
  You have access to raw survey datasets on a cohort study followed up at multiple ages. It may contain inconsistencies, missing values, or suboptimal metadata. Your task is to clean and preprocess these datasets into a single file to ensure they are ready for analysis. 
  Follow all instructions:

  1. Ensure when you load the input files you append the dir "data/input/" this is where they are stored.
  2. Rename variables. All variable names are short, descriptive, and lowercase (e.g., eth = ethnicity, lang = language, sori = sexual orientation). Age at measurement is appended as a numeric suffix (e.g., eth14 = ethnicity at age 14, sori19 = sexual orientation at age 19). 
  3. Use standard missing-value codes (minus values) for all variables e.g., -9 = Refusal, -8 = Don't know/insufficient information, -1 = Item not applicable, -3 = Not asked at the fieldwork stage/participated/interviewed, -2 = Schedule not applicable/Script error/information lost, -7 = Prefer not to say
  4. To support analyses across time, derive consistent response categories where possible at different ages. When identical response categories existed across ages, retain them unchanged. When categories differ, collapse or re-map them to a common scheme. Where using the same response categories is not possible (e.g., substantially different instruments, such as parental income collected with different bands), provide multiple variables with clearly labelled, age-specific categories.
  5. When harmonising missing value codes across waves, convert wave-specific negative codes (e.g., -100, -97, -999, -998, -997, -995, -94, -92, -91, -99) to the standard missing-value codes defined in instruction 3. Multiple wave-specific codes may map to the same standard code (e.g., -100 and -97 may both map to -3).
  6. For time-invariant or stable characteristics (e.g., sex, ethnicity, language spoken at home), create a single consolidated variable. The prioritisation strategy depends on the variable: for characteristics expected to be stable and established early (e.g., ethnicity, language), prioritise the earliest valid response; for characteristics that may be corrected or updated over time (e.g., sex), prioritise the most recent valid response. Only use positive values in the prioritisation logic; include missing codes as fallback values when no positive values exist.
  7. For time-varying characteristics that may legitimately change over the life course (e.g., sexual orientation, relationship status, employment), retain age-specific variables rather than creating a single consolidated measure, to preserve the temporal variation for longitudinal analysis.
  8. When recoding categorical variables, use factor variables with explicit labels for both valid categories and all missing value codes to preserve metadata.
  9. Use only standard R packages (haven, dplyr, purrr, labelled, readr are acceptable).
  10. Your R script must output one single cleaned csv named data/output/cleaned_data.csv
  11. Explicitly output only the derived variables that were created during the cleaning process to the csv (do not include intermediate wave-specific variables unless they are the final output).
  12. You must run your R script.
        
  Produce your script in R.
  Here is the appropriate metadata for the task:

  {metadata}