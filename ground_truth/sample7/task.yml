task_id: 1
task_type: data_cleaning_r
override: |
  You have access to raw survey datasets on a cohort study followed up at multiple ages. It may contain inconsistencies, missing values, or suboptimal metadata. Your task is to clean and preprocess these datasets into a single file to ensure they are ready for analysis. 
  Follow all instructions precisely:

  1. **File Loading**:
     - Load input files from "data/input/" directory using: file.path(data_path, "filename")
     - Set data_path variable: `data_path <- 'data/input/'`
     - Use read_delim() with show_col_types = FALSE parameter
     - Load ALL datasets mentioned in the metadata, even if some waves don't contribute to early age measurements
  
  2. **Variable Naming Conventions**:
     - Use the exact ID variable name from source data (e.g., NSID) - NEVER create or rename to generic "id"
     - For intermediate wave-specific raw variables, use suffix _raw (e.g., educaim17_raw, educaim19_raw)
     - For final age-specific OUTPUT variables, append only the age as numeric suffix (e.g., educaim17, educaim19, educaim20, educaim25, educaim32)
     - All variable names must be lowercase
     - Keep variable names short and descriptive
  
  3. **Standard Missing-Value Codes**:
     - -9 = Refusal
     - -8 = Don't know/insufficient information
     - -1 = Item not applicable
     - -3 = Not asked at the fieldwork stage/participated/interviewed
     - -2 = Schedule not applicable / Script error / Information lost
  
  4. **Response Category Harmonization**:
     - When the SAME construct is measured across ages with DIFFERENT response categories, harmonize them into a common coding scheme
     - Create age-specific variables (e.g., educaim17, educaim19, educaim20, educaim25, educaim32) that ALL use the SAME response categories
     - Each wave requires its own case_when() recoding logic to map original categories to the harmonized scheme
     - Include ALL waves that measure the construct, even if later waves (e.g., 8, 9) use very different source variables
  
    5. **Recoding Logic**:

     - Follow the EXACT value label mappings from metadata - DO NOT use generic patterns
     - Map each original value code to its harmonized category based on metadata labels
     - Convert wave-specific missing codes using metadata mappings (e.g., -94 → -2, -91 varies by wave)
     - For multi-variable derivation, use OR logic (|) checking multiple source variables
  
  6. **Complex Multi-Variable Derivation**:
     - Some waves (especially later adult waves) may derive variables from MULTIPLE source variables
     - Example: Educational aims at age 25 might combine an activity status variable (W8ACTIVITY05) with many qualification variables (W8ACQUC0A, W8ACQUC0B, etc.)
     - Use complex case_when() logic with OR conditions (|) to check multiple variables
     - Structure: Check activity status first, then check combinations of qualification variables
     - Follow the exact logical conditions specified in the metadata
  
  7. **Data Structure**:
     - Select needed variables from each wave dataset into separate list elements
     - Use list() to create educaim_vars or similar structure with named elements (S1, S4, S6, S7, S8, S9)
     - For waves with simple variables: `S4 = dataset %>% select(NSID, educaim17_raw = w4saim)`
     - For waves with complex derivations: `S8 = dataset %>% select(NSID, W8ACTIVITY05, starts_with("W8ACQUC"), starts_with("W8VCQUC"))`
     - Merge all list elements using: `reduce(variable_vars, full_join, by = "NSID")`
  
  8. **Recoding Logic Structure**:
     - Perform ALL recoding in a single mutate() call with separate case_when() for each age-specific variable
     - Use inline case_when() within mutate(), NOT separate helper functions
     - Structure for simple waves:
   ```r
       educaim17 = case_when(
         educaim17_raw %in% c(1:9, 10, 11) ~ 1,
         educaim17_raw == 14 ~ 5,
         educaim17_raw == -94 ~ -2,
         educaim17_raw == -91 ~ -1,
         TRUE ~ -3
       )
   ```
     - Structure for complex multi-variable waves:
   ```r
       educaim25 = case_when(
         W8ACTIVITY05 == 0 ~ 5,
         W8ACQUC0A == 1 | W8ACQUC0B == 1 | W8ACQUC0C == 1 ~ 0,
         W8ACQUC0F == 1 | W8ACQUC0G == 1 ~ 1,
         TRUE ~ -3
       )
   ```
  
  9. **Factor Variables and Labels**:
     - After recoding, convert ALL harmonized variables to factors using factor()
     - Use mutate(across()) to apply factor conversion to all age-specific variables at once
     - Specify numeric levels and character labels separately:
   ```r
       mutate(across(
         c(educaim17, educaim19, educaim20, educaim25, educaim32),
         ~ factor(
           .x,
           levels = c(0, 1, 2, 3, 4, 5, -1, -2, -3, -8, -9),
           labels = c("NVQ 4-5", "NVQ 1-3", "None/entry", "Other", 
                     "None of these qualifications", "Not studying",
                     "Item not applicable", "Script error/information lost",
                     "Not asked at the fieldwork stage/participated/interviewed",
                     "Don't know/insufficient information", "Refusal")
         )
       ))
   ```
     - Apply the SAME factor levels and labels to all age-specific versions
     - Do NOT use haven::labelled()
  
  10. **Package Requirements**:
      - Use ONLY standard R packages: haven, dplyr, purrr, here, labelled, readr
      - Load packages at the start of the script using library()
  
  11. **Output Requirements**:
      - Your R script must output one single cleaned csv named data/output/cleaned_data.csv
  
  12. **Variables to Include in Output**:
      - Use select() at the end to keep only: ID variable + all final age-specific harmonized variables
      - Example: `select(NSID, educaim17, educaim19, educaim20, educaim25, educaim32)`
      - Do NOT include raw variables (educaim17_raw, educaim19_raw, etc.)
      - Do NOT include source variables from datasets (W8ACTIVITY05, W8ACQUC0A, etc.)
      - Only output the final cleaned, harmonized, age-specific variables
  
  13. **Critical Distinctions**:
      - CONSOLIDATION tasks (e.g., lang): Create ONE variable from multiple waves using earliest valid value
      - HARMONIZATION tasks (e.g., educaim, ecoact): Create MULTIPLE age-specific variables with aligned response categories
      - This prompt is for HARMONIZATION tasks - you must create separate age-specific variables, not consolidate into one
  
  14. **Handling ALL Waves**:
      - Process ALL waves mentioned in the metadata, even if later waves seem very different
      - Later adult waves (e.g., waves 8, 9 at ages 25, 32) may use completely different source variables but must be harmonized to the same output categories
      - Don't skip waves just because they use different measurement approaches
  
  15. You must run your R script after generating it.
        
  Produce your script in R.
  
  Here is the appropriate metadata for the task:

  {metadata}