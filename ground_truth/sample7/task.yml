task_id: 1
task_type: data_cleaning_r
override: |
  You have access to raw survey datasets on a cohort study followed up at multiple ages. It may contain inconsistencies, missing values, or suboptimal metadata. Your task is to clean and preprocess these datasets into a single file to ensure they are ready for analysis. 
  Follow all instructions precisely:

  1. **File Loading**:
     - Load input files from "data/input/" directory using file.path(data_path, "filename")
     - Use read_delim() with show_col_types = FALSE
  
  2. **Variable Naming Conventions**:
     - Use the exact ID variable name from source data (e.g., NSID) - NEVER create or rename to generic "id"
     - For wave-specific variables during intermediate processing, use format: variablename_SX where X is wave number (e.g., lang_S1, lang_S2)
     - For age-specific OUTPUT variables, append the age as numeric suffix (e.g., educaim17 = education aim at age 17, educaim19 = at age 19)
     - All variable names must be lowercase
     - Keep variable names short and descriptive
  
  3. **Standard Missing-Value Codes**:
     Use these codes for ALL variables:
     - -9 = Refusal
     - -8 = Don't know/insufficient information
     - -1 = Item not applicable
     - -3 = Not asked at the fieldwork stage/participated/interviewed
     - -2 = Schedule not applicable / Script error / Information lost
  
  4. **Response Category Harmonization**:
     - When the SAME construct is measured across ages with DIFFERENT response categories, you must harmonize them into a common coding scheme
     - Create age-specific variables (e.g., educaim17, educaim19, educaim20) that use the SAME response categories
     - This requires recoding the original responses to align to a common scheme
     - Example: If wave 4 uses categories 1-14, wave 6 uses 1-16, and wave 7 uses 1-14, you must map them to common categories (e.g., 0=NVQ 4-5, 1=NVQ 1-3, 2=None/entry, 3=Other, 4=None of these, 5=Not studying)
  
  5. **Wave-Specific Missing Value Code Harmonization**:
     Convert wave-specific negative codes to standard codes. Use the EXACT mappings provided in the metadata.
     Common patterns (but always check metadata for specific mappings):
     - -94, -999, -998, -997, -995 often → -2
     - -99 often → -3
     - -92 often → -9
     - -91 might → -1 or -8 (check metadata)
  
  6. **Complex Variable Derivation**:
     - Some variables may require complex logic using multiple source variables (e.g., combining activity status with qualification variables)
     - Follow the exact derivation logic specified in the metadata
     - Use case_when() for conditional recoding
     - Handle each wave's logic separately before combining into the output dataset
  
  7. **Factor Variables and Labels**:
     - After recoding, convert harmonized categorical variables to factors using factor()
     - Include explicit labels for BOTH valid response categories AND all missing value codes
     - Apply the same factor levels and labels to all age-specific versions of the same variable
     - Do NOT use haven::labelled() unless specifically instructed
  
  8. **Package Requirements**:
     - Use only standard R packages (haven, dplyr, purrr, here, labelled, readr are acceptable).
  
  9. **Output Requirements**:
     - Output file MUST be named: `data/output/cleaned_data.csv` (NOT cleaned_data.csv)

  10. **Variables to Include in Output**:
      - ALWAYS include the ID variable (e.g., NSID)
      - Include age-specific harmonized variables (e.g., educaim17, educaim19, educaim20, educaim25, educaim32)
      - Do NOT include raw/original variables from source data
      - Do NOT include intermediate processing variables (those ending in _raw, _S1, _S2, etc.)
      - Only output the final cleaned, harmonized, age-specific variables specified in the metadata
  
  11. **Data Merging**:
      - Use purrr::reduce() with full_join() when combining multiple datasets
      - Always join on the ID variable (e.g., NSID)
      - Example: `reduce(list_of_dataframes, full_join, by = "NSID")`
  
  12. **Critical Distinctions**:
      - CONSOLIDATION (e.g., lang): Create ONE variable from multiple waves using earliest valid value
      - HARMONIZATION (e.g., educaim): Create MULTIPLE age-specific variables with aligned response categories
      - The task type should be clear from the metadata - read carefully to determine which approach is needed
  
  13. You must run your R script after generating it.
        
  Produce your script in R.
  
  Here is the appropriate metadata for the task:

  {metadata}