task_id: 1
task_type: data_cleaning_r
override: |
  You have access to raw survey datasets on a cohort study followed up at multiple ages. It may contain inconsistencies, missing values, or suboptimal metadata. Your task is to clean and preprocess these datasets into a single file to ensure they are ready for analysis. 
  Follow all instructions:

  1. Ensure when you load the input files you append the dir "data/input/" this is where they are stored.
  2. Rename variables. All variable names are short, descriptive, and lowercase (e.g., eth = ethnicity, lang = language, sori = sexual orientation, partnr = partnership/marital status, reg = region, educaim = educational aims/qualifications being studied). Age at measurement is appended as a numeric suffix (e.g., educaim17 = educational aims at age 17). Use prefixes to distinguish different aspects of the same concept (e.g., regub = urban/rural classification, regov = government office region).
  3. Use standard missing-value codes (minus values) for all variables e.g., -9 = Refusal, -8 = Don't know/insufficient information, -1 = Item not applicable, -3 = Not asked at the fieldwork stage/participated/interviewed, -2 = Schedule not applicable/Script error/information lost, -7 = Prefer not to say
  4. To support analyses across time, derive consistent response categories where possible at different ages. When identical response categories existed across ages, retain them unchanged. When categories differ, collapse or re-map them to a common scheme. Where using the same response categories is not possible (e.g., substantially different instruments, such as parental income collected with different bands), provide multiple variables with clearly labelled, age-specific categories.
  5. For variables where later waves have more detailed categories than earlier waves (e.g., marital status that distinguishes civil partnerships in later waves but not earlier ones), create both: (a) collapsed harmonised variables with consistent categories across all ages to enable temporal comparisons, and (b) detailed age-specific variables that preserve the full granularity of later measurements for nuanced analysis.
  6. When measurement approaches differ substantially across waves (e.g., a single categorical variable in early waves vs. multiple binary indicators in later waves), derive consistent categories by: (a) directly recoding single categorical variables, and (b) applying logical rules to multiple binary indicators to assign participants to mutually exclusive categories based on the qualifications they are pursuing.
  7. For variables measuring related but distinct geographical concepts (e.g., urban/rural classification, government office region, country of residence), retain all age-specific measures rather than attempting to harmonise across different geographical dimensions.
  8. When creating derived categorical variables from more detailed measures (e.g., collapsing multiple location categories into a binary UK/abroad indicator, or deriving qualification levels from binary indicators), apply the transformation consistently and convert the result to a labeled factor.
  9. When harmonising missing value codes across waves, convert wave-specific negative codes (e.g., -100, -97, -999, -998, -997, -995, -94, -92, -91, -99) to the standard missing-value codes defined in instruction 3. Multiple wave-specific codes may map to the same standard code (e.g., -100 and -97 may both map to -3).
  10. For time-invariant or stable characteristics (e.g., sex, ethnicity, language spoken at home), create a single consolidated variable. The prioritisation strategy depends on the variable: for characteristics expected to be stable and established early (e.g., ethnicity, language), prioritise the earliest valid response; for characteristics that may be corrected or updated over time (e.g., sex), prioritise the most recent valid response. Only use positive values in the prioritisation logic; include missing codes as fallback values when no positive values exist.
  11. For time-varying characteristics that may legitimately change over the life course (e.g., sexual orientation, relationship status, employment, geographical location, educational activities), retain age-specific variables rather than creating a single consolidated measure, to preserve the temporal variation for longitudinal analysis.
  12. When recoding categorical variables, use factor variables with explicit labels for both valid categories and all missing value codes to preserve metadata.
  13. Use only standard R packages (haven, dplyr, purrr, here, labelled, readr are acceptable).
  14. Your R script must output one single cleaned csv named data/output/cleaned_data.csv
  15. Explicitly output only the derived variables that were created during the cleaning process to the csv (do not include intermediate wave-specific variables unless they are the final output).
  16. You must run your R script.
        
  Produce your script in R.
  Here is the appropriate metadata for the task:

  {metadata}