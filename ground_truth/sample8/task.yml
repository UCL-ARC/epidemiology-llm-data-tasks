task_id: 1
task_type: data_cleaning_r
override: |
  You have access to raw survey datasets from a longitudinal cohort study followed across multiple waves. Your task is to clean and harmonise educational qualification variables only and produce a single cleaned file ready for analysis.

  Follow all instructions:

  1. When loading input files, always prepend the directory data/input/.
  2. Use only standard R packages: haven, dplyr, purrr, labelled, readr.
  3. Load the specified wave files and merge all datasets using full_join by NSID.
  4. Select only the variables required to derive education measures plus NSID. Do not retain or derive any non-education variables.
  5. Derive exactly four variables and no others:
      - educ25 (collapsed NVQ level at age ~25, wave 8)
      - educ32 (collapsed NVQ level at age ~32, wave 9)
      - educadtl32 (detailed academic qualifications at age 32)
      - educvdtl32 (detailed vocational qualifications at age 32)
  6. For educ25 and educ32, harmonise responses to a common collapsed NVQ scheme with standard negative missing codes, and convert both to labelled factor variables using identical category labels.
  7. For educadtl32 and educvdtl32, derive a single categorical variable from mutually exclusive binary indicators, correctly handling all-zero, all-missing, and negative-code cases, and preserve full category detail as labelled factors.
  8. Harmonise all wave-specific negative missing codes to the standard scheme (-9, -8, -7, -3, -2, -1) and retain missing codes as explicit factor levels.
  9. Do not create harmonised “highest”, summary, or placeholder variables. Do not infer or invent mappings beyond the provided metadata.
  10. Explicitly output only the final derived variables and NSID (no intermediate or wave-specific variables).
  11. Write a single CSV file named data/output/cleaned_data.csv.
  12. You must run your R script.
        
  Produce your script in R.
  Here is the appropriate metadata for the task:

  {metadata}