task_id: 1
task_type: data_cleaning_r
override: |
  You have access to raw survey datasets from a longitudinal cohort study. Clean and harmonise educational qualification variables only.

  Requirements:

  1. Setup:
      - Use only: haven, dplyr, purrr, labelled, readr
      - Prepend data/input/ to all file paths
      - Load all six data files from metadata, selecting NSID plus all education variables
      - Merge all datasets by NSID using full_join
  
  2. Derive exactly four variables:
      - educ25: Collapsed NVQ level at age 25 (wave 8)
      - educ32: Collapsed NVQ level at age 32 (wave 9)
      - educadtl32: Detailed academic qualification at age 32
      - educvdtl32: Detailed vocational qualification at age 32
  
  3. educ25 (Age 25 NVQ Level):
      - Sources: W8DHANVQH (derived academic NVQ) + W8VCQU* variables (individual vocational qualifications)
      - Challenge: W8DHANVQH captures academic qualifications but NOT vocational ones from W8VCQU* series
      - Task: Examine each W8VCQU* variable label in metadata to determine what qualification it represents
      - Map each vocational qualification to its appropriate NVQ equivalent level based on educational content
      - CRITICAL: Different W8VCQU* variables map to different NVQ levels - do not treat them uniformly
      - Combine W8DHANVQH and mapped W8VCQU* responses, taking the highest qualification indicated
      - Output: 5-level factor (0-4) with levels:
        * 0 = NVQ 4-5 equivalent qualifications
        * 1 = NVQ 1-3 equivalent qualifications
        * 2 = Entry level or no qualifications
        * 3 = Other qualifications not mappable to NVQ
        * 4 = None of these qualifications
      - Preserve missing codes (-9, -8, -3, -2, -1) as factor levels
  
  4. educ32 (Age 32 NVQ Level):
      - Sources: W9DANVQH (derived academic NVQ) + W9DVNVQH (derived vocational NVQ)
      - Both sources are already at NVQ level - no individual qualification mapping needed
      - Combine both, taking highest level indicated
      - Output: Same 5-level factor structure as educ25 with identical labels
      - Preserve missing codes as factor levels
  
  5. educadtl32 (Academic Qualification Detail):
      - Source: W9ACQU* variables (mutually exclusive binary indicators)
      - Find the single "Yes" (=1) response and return its qualification label
      - If all "No" (=2), return "None of these qualifications"
      - Handle "Don't know" (W9ACQU0T), "Refused" (W9ACQU0U), "No answer" (W9ACQU0V) as missing codes
      - Output: Labelled factor with all qualification types from metadata plus missing codes
  
  6. educvdtl32 (Vocational Qualification Detail):
      - Source: W9VCQU* variables (mutually exclusive binary indicators)
      - Same logic as educadtl32 but for vocational qualifications
      - Handle "Don't know" (W9VCQUAH), "Refused" (W9VCQUAI) as missing codes
      - Output: Labelled factor with all qualification types from metadata plus missing codes
  
  7. Data quality rules:
      - When multiple sources show different levels, always take the HIGHEST qualification
      - For educ25: Must map each W8VCQU* to appropriate NVQ level using metadata labels
      - Preserve all missing codes (-9, -8, -3, -2, -1) as explicit factor levels (not NA)
      - educ25 and educ32 must have identical factor structures and labels
  
  8. Output:
      - Select only: NSID, educ25, educ32, educadtl32, educvdtl32
      - All derived variables must be labelled factors
      - Write to: data/output/cleaned.csv (row.names = FALSE)
      - Run the script to verify execution
        
  Produce your script in R using the metadata below:

  {metadata}