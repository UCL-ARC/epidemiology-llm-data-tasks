task_id: 1
task_type: data_cleaning_r
override: |
  You have access to raw survey datasets from a longitudinal cohort study with repeated family background interviews. Your task is to clean and consolidate parental education variables only and produce a single cleaned file ready for analysis.

  Follow all instructions:

  1. **File Loading**:
     - When loading input files, always prepend the directory data/input/.
     - Load the family background datasets from waves 1, 2, and 4.
     - Merge all datasets using full_join by NSID.

  2. **Variable Selection**:
     - Select only the parental highest qualification variables for mother and father plus NSID.
     - Do not retain or derive any non-parental-education variables.

  3. **Variable Naming Conventions**:
     - Use the exact ID variable name from source data (NSID).
     - Rename variables using the standard convention:
       * educdtlma = detailed maternal education (consolidated across waves)
       * educdtlpa = detailed paternal education (consolidated across waves)
       * educma = collapsed maternal education
       * educpa = collapsed paternal education

  4. **Consolidation Logic for Time-Invariant Characteristics**:
     - For parental education (stable characteristics), create a single consolidated detailed variable for each parent.
     - Prioritise valid positive responses across waves in the specified order.
     - Fall back to negative codes when no positive values exist.

  5. **Derived Collapsed Variables**:
     - From each consolidated detailed variable, derive a collapsed parental education variable.
     - Map detailed categories to a common NVQ-style scheme.
     - Retain negative missing codes unchanged.

  6. **Missing Value Code Harmonization**:
     - Harmonise all wave-specific negative missing codes to the standard scheme:
       * -9 = Refusal
       * -8 = Don't know/insufficient information
       * -7 = Prefer not to say
       * -3 = Not asked at the fieldwork stage/participated/interviewed
       * -2 = Schedule not applicable/Script error/information lost
       * -1 = Item not applicable
     - Preserve missing codes as explicit factor levels.

  7. **Factor Variables and Labels**:
     - Convert both collapsed and detailed parental education variables to labelled factor variables.
     - Include explicit labels for all valid categories and missing codes.

  8. **Scope Restrictions**:
     - Do not create age-specific parental variables.
     - Do not create harmonised summaries beyond mother and father.
     - Do not create any additional derived measures.

  9. **Package Requirements**:
     - Use ONLY standard R packages: haven, dplyr, purrr, labelled, readr.
     - Load packages at the start of the script using library().

  10. **Output Requirements**:
      - Output dataset must contain exactly 5 variables: NSID, educma, educpa, educdtlma, educdtlpa.
      - Write a single CSV file named data/output/cleaned_data.csv.

  11. **Execution**:
      - Produce a complete, runnable R script that performs this workflow using the provided metadata.
      - You must run your R script after creating it.

  Produce your script in R.
  
