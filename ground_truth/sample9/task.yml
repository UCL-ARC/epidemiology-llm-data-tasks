task_id: 1
task_type: data_cleaning_r
override: |
  You have access to raw survey datasets from a longitudinal cohort study with repeated family background interviews. Your task is to clean and consolidate parental education variables only and produce a single cleaned file ready for analysis.

  Follow all instructions:

  1. When loading input files, always prepend the directory data/input/.
  2. Use only standard R packages: haven, dplyr, purrr, here, labelled, readr.
  3. Load the family background datasets from waves 1, 2, and 4 and merge all datasets using full_join by NSID.
  4. Select only the parental highest qualification variables for mother and father plus NSID. Do not retain or derive any non-parental-education variables.
  5. Rename variables using the standard convention:
      - educdtlma = detailed maternal education (consolidated across waves)
      - educdtlpa = detailed paternal education (consolidated across waves)
      - educma = collapsed maternal education
      - educpa = collapsed paternal education
  6. For parental education (stable characteristics), create a single consolidated detailed variable for each parent by prioritising valid positive responses across waves in the specified order, and falling back to negative codes when no positive values exist.
  7. From each consolidated detailed variable, derive a collapsed parental education variable by mapping detailed categories to a common NVQ-style scheme and retaining negative missing codes unchanged.
  8. Harmonise all wave-specific negative missing codes to the standard scheme (-9, -8, -7, -3, -2, -1) and preserve missing codes as explicit factor levels.
  9. Convert both collapsed and detailed parental education variables to labelled factor variables with explicit labels for all valid categories and missing codes.
  10. Do not create age-specific parental variables, harmonised summaries beyond mother and father, or any additional derived measures.
  11. Explicitly output only the final derived variables and NSID:
        educma, educpa, educdtlma, educdtlpa
  12. Write a single CSV file named data/output/cleaned_data.csv.
  13. Produce a complete, runnable R script that performs this workflow using the provided metadata.
  Here is the appropriate metadata for the task:

  {metadata}