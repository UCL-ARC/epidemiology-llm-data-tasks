task_id: 1
task_type: data_cleaning_r_plus
name: ns_sec_parents
additional_requirements: |
  Derive time-varying parental NS-SEC occupational class variables. Output ten variables plus NSID, one for each parent at each of the five waves:
    nssecma14, nssecpa14  (wave 1, age 14)
    nssecma15, nssecpa15  (wave 2, age 15)
    nssecma16, nssecpa16  (wave 3, age 16)
    nssecma17, nssecpa17  (wave 4, age 17)
    nssecma18, nssecpa18  (wave 5, age 18)
  Mother's NS-SEC variables should use the nssecma* prefix, and father's NS-SEC variables should use the nssecpa* prefix.
  Derivation logic: the raw source variables use fractional sub-category codes (e.g., 3.1, 3.2, 12.4) that subdivide the 17 major NS-SEC categories. Collapse each fractional code to its major category by taking the integer part, then apply the 17-category labels from the metadata. The scheme is identical across all ten variables.
  Missing data: -98 ("Parent not present") → -3.
  Note: at wave 5, the source variables measure the mother’s or father’s partner rather than the biological parent; still assign to nssecma18 and nssecpa18 respectively.
additional_requirements_lite: |
  Derive time-varying parental NS-SEC occupational class variables named nssecma14, nssecpa14, nssecma15, nssecpa15, nssecma16, nssecpa16, nssecma17, nssecpa17, nssecma18, and nssecpa18 ensuring the categories are collapsed to their major NS-SEC category.
override: |
  You have access to raw survey datasets from a longitudinal cohort study. Your task is to clean and harmonise parental NS-SEC occupational class variables across waves and output a single cleaned dataset.

  Follow all instructions:

  1. **File Loading**:
     - Ensure when you load the input files you append the dir "data/input/" this is where they are stored.
     - Load each dataset into a separate object and merge using full_join by the ID variable.
     - The input files are tab-delimited (.tab) text files. Use `readr::read_delim()` with `delim = "\t"` to load them. 
     - Load each file explicitly by name from the metadata.
     
  2. **Variable Naming Conventions**:
     - Use the exact ID variable name from source data (NSID).
     - Use short, descriptive, lowercase variable names.
     - For parental occupational class use:
       * nssecma14–nssecma18 for mothers
       * nssecpa14–nssecpa18 for fathers

  3. **Variable Selection and Renaming**:
     - Retain only parental NS-SEC variables.
     - Rename them to nssecma14–nssecma18 and nssecpa14–nssecpa18.

  4. **NS-SEC Classification Harmonization**:
     - Recode each wave into the harmonised 17-category NS-SEC classification.
     - Collapse detailed subcategories by taking the integer part.
     - Accept only categories 1–17 as valid occupational classes.
     - Recode fractional or invalid values to missing.

  5. **Missing Value Code Harmonization**:
     - Harmonise all wave-specific negative codes:
       * -999 → -2 (Script error/information lost)
       * -94 → -8 (Don't know/insufficient information)
       * -99, -98, and NA → -3 (Not asked/not interviewed)
     - Preserve standard missing codes:
       * -9 = Refusal
       * -8 = Don't know
       * -7 = Prefer not to say
       * -3 = Not asked/not interviewed
       * -2 = Script error/information lost
       * -1 = Not applicable

  6. **Time-Varying Characteristics**:
     - Retain separate detailed age-specific variables for mothers and fathers.
     - Do not collapse across ages and do not create consolidated measures.

  7. **Factor Variables and Labels**:
     - Convert all NS-SEC variables to labelled factor variables with explicit labels for:
       * Each category (1–17)
       * All standard missing codes

  8. **Package Requirements**:
     - Use ONLY standard R packages: haven, dplyr, purrr, labelled, readr.
     - Load packages at the start of the script using library().

  9. **Output Requirements**:
     - Output only the following variables:
       * NSID
       * nssecma14, nssecpa14
       * nssecma15, nssecpa15
       * nssecma16, nssecpa16
       * nssecma17, nssecpa17
       * nssecma18, nssecpa18
     - Write exactly one CSV file named data/output/cleaned_data.csv.

  10. **Execution**:
      - You must run your R script after generating it.
      - IMPORTANT: If your R script fails, read the error message carefully, fix the script, and try again. Never return an error message as your final answer.

  Produce your script in R.
  
  Here is the appropriate metadata for the task:

  {metadata}