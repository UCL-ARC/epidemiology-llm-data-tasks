tasks:
  - task_type: data_cleaning_r
    prompt: |
      You have access to raw survey datasets on a cohort study followed up at multiple ages. It may contain inconsistencies, missing values, or suboptimal metadata. Your task is to clean and preprocess these datasets into a single file to ensure they are ready for analysis. 
      Follow all instructions:

      1. Ensure when you load the input files you append the dir "data/input/" this is where they are stored.
      2. Identify and handle missing values appropriately (e.g., imputation, removal).
      3. Correct any data type inconsistencies (e.g., converting strings to dates).
      4. Remove duplicate records.
      5. Standardise formats for categorical variables
      6. Consolidate any variables
      7. Use only standard R libraries
      8. Your R script must output one single cleaned csv named data/output/cleaned_data.csv
      9. Explicitly output only the derived variables that were created during the cleaning process to the csv
      10. You must run your R script.

      Produce your script in R.
      Here is the appropriate metadata for the task:
      
      {metadata}
  - task_type: data_cleaning_r_plus_old
    prompt: |
      You have access to raw survey datasets from a longitudinal cohort study followed at multiple ages. Your task is to clean and preprocess these datasets into a single analysis-ready file.

      Follow all instructions:

      1. **File Loading**:
         - Load all input files from "data/input/" (prepend this path to every filename in the metadata).
         - The files are tab-delimited (.tab) text files. Use `readr::read_delim()` with `delim = "\t"`.
         - Load each file explicitly by name from the metadata into a separate object.
         - Merge all datasets using `full_join` by the ID variable.
         - Load ALL files listed in the metadata, even if a file contains only the ID variable — all files are needed to construct the complete cohort frame.

      2. **ID Variable**:
         - Use the exact ID variable name from the source data (e.g., NSID). Do NOT rename it to a generic name such as "id".

      3. **Standard Missing-Value Codes**:
         Use these codes consistently for ALL variables:
         - -9 = Refusal
         - -8 = Don't know / insufficient information
         - -7 = Prefer not to say (apply only where explicitly present in the source data or metadata)
         - -3 = Not asked at the fieldwork stage / not interviewed
         - -2 = Schedule not applicable / script error / information lost
         - -1 = Item not applicable
         - Recode all NA / Null values to -3 (not asked / not interviewed).
         - NEVER collapse different missing-value meanings into the same code unless the metadata explicitly instructs it.

      4. **Missing Value Code Harmonisation**:
         - Convert all wave-specific negative codes to the standard scheme using the label text in the metadata to determine the correct mapping.
         - Common patterns (always verify against metadata):
           * -999, -998, -997, -995 → -2
           * -94 → -8
           * -92 → -9
           * -91 → -1
           * -99 → -3
           * -100, -97 → -3

      5. **Variable Naming**:
         - All derived variable names must be short, descriptive, and lowercase.
         - For age-specific variables: append the age as a numeric suffix (e.g., eth14, ecoact25).
         - Common abbreviations: eth = ethnicity, lang = language, sori = sexual orientation,
           partnr = partnership/marital status, reg = region, educaim = educational aims,
           educ = educational qualifications, ecoact = economic activity, nssec = occupational class,
           inc = income, imd = area deprivation, hown = housing tenure.
         - For parental variables: include a parent identifier in the name
           (e.g., nssecma14 = mother's NS-SEC at age 14; nssecpa14 = father's NS-SEC at age 14).
         - For detailed adult versions where both collapsed and detailed forms are required:
           append "adu" before the age suffix (e.g., ecoactadu25).

      6. **Time-Invariant vs Time-Varying Characteristics**:
         - For **time-invariant** or stable characteristics (e.g., sex, ethnicity, language spoken at home):
           * Create a single consolidated variable across waves.
           * Prioritise the earliest valid positive response for characteristics established early (e.g., ethnicity, language).
           * Prioritise the most recent valid positive response for characteristics that may be updated over time (e.g., sex).
           * Only use positive values in prioritisation; fall back to missing codes when no positive value exists.
         - For **time-varying** characteristics (e.g., economic activity, employment, relationship status, income, educational aims, occupational class, geographical location, area deprivation, mental health):
           * Retain separate age-specific variables rather than consolidating.
           * Preserve temporal variation for longitudinal analysis.

      7. **Response Category Harmonisation**:
         - When the same construct is measured across ages with DIFFERENT response categories, harmonise into a common coding scheme.
         - Map raw categories by LABEL MEANING, not by numeric code — the same integer can mean different things in different waves. Always check value_labels in the metadata before mapping.
         - Each wave requires its own `case_when()` block; do not assume codes are consistent across waves.
         - Simply remapping missing codes and passing raw integers through is NOT harmonisation.
         - Where harmonisation is not possible (e.g., income bands with incompatible thresholds across ages), retain separate age-specific variables with clearly labelled categories.
         - Response options indicating non-substantive answers (e.g., "Prefer not to say", "Don't want to answer") must be mapped to the appropriate standard missing-value code, NOT treated as substantive response categories.

      8. **Dual-Level Variables (Collapsed + Detailed)**:
         - Where later waves have more detailed response categories than earlier waves, create both:
           a. A collapsed harmonised variable using consistent categories across all ages (for temporal comparison).
           b. A detailed age-specific variable preserving the full granularity where it exists.
         - Collapsed variables must have FEWER categories than detailed versions; they cannot be copies.
         - Include both versions in the final output.

      9. **Factor Variables and Labels**:
         - Convert all categorical derived variables to labelled factor variables with explicit labels for both valid categories and all applicable missing-value codes.
         - For continuous variables (e.g., income scores, deprivation scores, BMI): use `labelled::labelled()` with labels only for missing codes; retain valid values as numeric.

      10. **Package Requirements**:
          - Use ONLY: haven, dplyr, purrr, labelled, readr.
          - Load all packages at the start of the script using `library()`.

      11. **Output Requirements**:
          - Write exactly one CSV named `data/output/cleaned_data.csv`.
          - Use `write_csv()` or `write.csv(..., row.names = FALSE)`.
          - Include the ID variable and only the final derived variables.
          - Do NOT include raw source variables or intermediate wave-specific working variables.

      12. **Execution**:
          - You must run your R script after generating it.
          - If the script fails, read the error carefully, fix it, and try again. Never return an error message as your final answer.

      **Important** Additional requirements for this task:

      {additional_requirements}

      Produce your script in R.

      Here is the appropriate metadata for the task:

      {metadata}
  - task_type: data_cleaning_r_plus
    prompt: |
      You have access to raw survey datasets from a longitudinal cohort study, {cohort_name}, followed at multiple ages. Your task is to clean and preprocess these datasets into a single cleaned file.

      The metadata defines the files, source variables, labels, and missing-value meanings. Use the metadata and the additional requirements to infer the target construct, source variables, output structure, harmonisation procedure, and final variables.

      Follow all instructions. Where these are in conflict, prioritise the additional requirements over the general guidance. Where the general guidance is in conflict with itself, prioritise later points over earlier points.

      **General Guidance:**

      1. **File Loading**
         - Load all input files from `data/input/` by prepending this path to every filename in the metadata.
         - The input files are tab-delimited `.tab` files. Use `readr::read_delim()` with `delim = "\t"`.
         - Load each file explicitly by name from the metadata into a separate object.
         - Merge datasets using `full_join` by the source ID variable.
         - Load all files listed in the metadata, including files that contain only the ID variable, so the full cohort data frame is preserved.

      2. **ID Variable**
         - Use the exact ID variable name from the source data, such as `NSID`.
         - Do not rename the ID variable to a generic name such as `id`.

      3. **Identify the Target Variables**
         - Use the additional requirements to identify the construct and required output variable names.
         - Use metadata for the files and the variables to identify all relevant source variables for that construct.
         - If a file is listed in the metadata, load it and include it in the merge frame, but do not create an output variable from it unless the task requires one.

      4. **Decide the Output Structure**
         - Decide whether the construct should be represented as:
           a. one consolidated variable across waves, meaning one final value per person,
           b. separate age-specific or wave-specific variables,
           c. both collapsed and detailed variables, or
           d. multiple related but distinct variables.
         - Base this decision on the construct, metadata labels, available waves, and additional requirements.
         - For stable or time-invariant constructs, create a consolidated variable when appropriate.
         - For time-varying constructs, retain separate age-specific or wave-specific variables when appropriate.
         - If later waves contain more detailed response categories than earlier waves and the task requires comparability, create collapsed harmonised variables and also retain detailed variables where requested or needed to satisfy the requirements.

      5. **Variable Naming**
         - Use the output variable names requested in the additional requirements where provided.
         - Otherwise, choose short, descriptive, lowercase names.
         - For age-specific variables, append the age as a numeric suffix. 
            - Infer from the variable and file metadata which age to use for the suffix.
         - For detailed adult versions where both collapsed and detailed forms are needed, append `adu` before the age suffix. 
            - Here `adu` means "adult detailed": it marks a more granular adult-wave variable that is retained alongside the collapsed harmonised adult variable.
            - Example: `partnr25` is the collapsed harmonised adult variable at age 25, while `partnradu25` is the detailed adult version at age 25.
         - Keep only final derived variables in the output, not raw source variables or intermediate working variables.
         - Do not use raw source variables as output variables. If no cleaning is required to make the output variable, create a copy of the raw source variable.

      6. **Standard Missing-Value Codes**
         -  Use these codes consistently for derived variables:
            - `-9` = Refusal
            - `-8` = Don't know / insufficient information
            - `-7` = Prefer not to say
            - `-3` = Not asked at the fieldwork stage / not interviewed
            - `-2` = Schedule not applicable / script error / information lost
            - `-1` = Item not applicable
         - Convert NA / Null values to `-3` unless the metadata or additional requirements indicate a more specific meaning.
         - Preserve distinct missing-value meanings; do not collapse different missing reasons together unless instructed.

      7. **Missing Value Harmonisation**
         - Convert wave-specific negative codes to the standard missing-value scheme using the metadata label meaning.
         - The label meaning is more important than the numeric code.
         - After mapping by label meaning, use these common numeric patterns only as sanity checks:
           * `-999`, `-998`, `-997`, `-995` usually indicate schedule not applicable, script error, or information lost and often map to `-2`.
           * `-94` may mean insufficient information or script/information loss; decide from the metadata label or additional requirements.
           * `-92` usually maps to `-9`.
           * `-91` usually maps to `-1`.
           * `-99` usually maps to `-3`.
           * `-100` and `-97` depend on their labels; map them by meaning, not by numeric value.

      8. **Response Category Harmonisation**
         - Based on the metadata, decide whether variables measuring the same construct need harmonised response categories so they can be compared across waves.
         - Harmonised variables should use the same response categories, codes, and labels across waves.
         - If source variables already have identical meanings and categories, preserve those categories.
         - If one source variable has more detailed categories than another, reduce or collapse the more detailed categories only as much as needed to match the less detailed measure.
         - Preserve as much substantive detail as possible while making the harmonised variables comparable and also meeting the additional requirements specified for the task.
         - Map categories by label meaning, not by raw numeric code; the same numeric code can represent different categories in different waves.
         - Check `value_labels` for each source variable before mapping categories, and use wave-specific recoding logic where category meanings differ by wave.
         - If categories cannot be made comparable without losing important meaning, keep separate clearly labelled variables instead of forcing harmonisation.
         - Treat non-substantive answers such as "Prefer not to say" or "Don't want to answer" as missing-value categories, not as substantive categories.

      9. **Consolidation and Prioritisation**
         - When deriving a consolidated variable, use valid substantive responses before missing codes.
         - Use earliest-valid-first for consolidated variables, including stable characteristics such as ethnicity or birth characteristics, unless the additional requirements specify otherwise.
         - For sex only, use most-recent-valid-first unless the additional requirements specify a different rule.
         - Ignore apparent disagreements across waves unless the additional requirements define a specific reconciliation rule; prioritise by the selected earliest-valid or most-recent-valid rule.
         - If no valid substantive response is available, fall back to an appropriate harmonised missing code.
         - Do not let a missing code override a valid substantive response from another wave.

      10. **Labels and Data Types**
          - For categorical derived variables, create labelled factors with explicit labels for all valid categories and applicable missing-value codes.
          - Order factor levels according to the source variable ordering shown in the metadata. For harmonised variables built from multiple sources, follow the ordering of the source variable that defines the harmonised category scheme.
          - For continuous or score variables, keep valid values numeric and attach labels only for missing-value codes where useful.
          - Ensure variables intended for comparison across waves use consistent codes and labels.

      11. **Allowed Packages**
          - Besides Base R functions, use only these packages: `haven`, `dplyr`, `tidyr`, `purrr`, `labelled`, `readr`.
          - Load packages at the start of the script using `library()`.

      12. **Output Requirements**
          - Write exactly one CSV named `data/output/cleaned_data.csv`.
          - Include the ID variable and only final derived variables.
          - Do not include raw source variables or intermediate working variables.
          - Use `readr::write_csv()`.

      13. **Execution**
          - Run the R script after generating it in the same response, using the available bash tool or equivalent command-line execution with `Rscript`.
          - If the script fails, read the error, fix the script, and run it again.
          - Never return an execution error as the final answer.

      **Additional requirements for this task:**

      {additional_requirements}

      Produce your script in R.

      Here is the appropriate metadata for the task:

      {metadata}