tasks:
  - task_type: data_cleaning_r
    prompt: |
      You have access to raw survey datasets on a cohort study followed up at multiple ages. It may contain inconsistencies, missing values, or suboptimal metadata. Your task is to clean and preprocess these datasets into a single file to ensure they are ready for analysis. 
      Follow all instructions:

      1. Rename variables. All variable names are short, descriptive, and lowercase (e.g., eth = ethnicity). Age at measurement is appended as a numeric suffix (e.g., eth14 = ethnicity at age 14). 
      2. Use standard missing-value codes (minus values) for all variables e.g., -9 = Refusal  -8 = Don’t know/insufficient information -1 = Item not applicable
      3. To support analyses across time, derive consistent response categories where possible at different ages. When identical response categories existed across ages, retained them unchanged. When categories differ,  collapsed or re-mapped them to a common scheme.  Where using the same response categories is not possible (e.g., substantially different instruments, such as parental income collected with different bands), provide multiple variables with clearly labelled, age-specific categories.
      4. Use only standard R 
      5. Your R script must output one single cleaned csv named data/output/cleaned_data.csv
      6. You must run your R script.
            
      Produce your script in R.
      Here is the appropriate metadata for the task:
      
      {metadata}
