tasks:
  - task_type: data_cleaning_r
    prompt: |
      You have access to raw survey datasets on a cohort study followed up at multiple ages. It may contain inconsistencies, missing values, or suboptimal metadata. Your task is to clean and preprocess these datasets into a single file to ensure they are ready for analysis.
      
      Follow all instructions:

      1. **File Loading**:
        - Ensure when you load the input files you append the dir "data/input/" this is where they are stored.
        - Load each dataset into a separate object and merge using full_join by the ID variable.
        - The input files are tab-delimited (.tab) text files. Use `readr::read_delim()` with `delim = "\t"` to load them.
        - Load each file explicitly by name from the metadata.

      2. **Variable Naming Conventions**:
        - Use the exact ID variable name from source data (e.g., NSID) and do NOT rename it to a generic `id`.
        - All variable names must be short, descriptive, and lowercase.
        - Common abbreviations: `eth`, `lang`, `sori`, `partnr`, `reg`, `educaim`, `educ`, `ecoact`, `nssec`, `inc`, `imd`, `hown`.
        - For age-specific variables: append age as a numeric suffix (e.g., `eth14`, `ecoact17`, `nssec25`).
        - For detailed adult versions: append `adu` before the age suffix (e.g., `ecoactadu25`, `partnradu32`).
        - For parental variables: include parent identifier and age (e.g., `nssecma14`, `nssecpa14`).

      3. **Standard Missing-Value Codes**:
        Use these codes for ALL variables unless the metadata explicitly requires otherwise:
        - `-9` = Refusal
        - `-8` = Don't know/insufficient information
        - `-1` = Item not applicable
        - `-3` = Not asked at the fieldwork stage/participated/interviewed
        - `-2` = Schedule not applicable/Script error/information lost
        - `-7` = Prefer not to say, only if specified in metadata
        - Recode `NA` to `-3` when the absence of a response corresponds to not asked / not interviewed.

      4. **Response Category Harmonization**:
        - When the same construct is measured across ages with different response categories, harmonize them into a common coding scheme where possible.
        - If full harmonization is not possible, retain multiple clearly labelled age-specific variables.
        - Preserve as much conceptual detail as possible while maintaining comparability across ages.

      5. **Dual-Level Variables**:
        - If later waves contain more detailed categories than earlier waves, create both:
          - collapsed harmonised variables for cross-age comparison
          - detailed age-specific variables for later waves where extra granularity exists

      6. **Missing Value Code Harmonization**:
        - Convert wave-specific negative codes (for example `-100`, `-97`, `-999`, `-998`, `-997`, `-995`, `-94`, `-92`, `-91`, `-99`, `-98`, `-996`) to the standard codes above.
        - Multiple wave-specific codes may map to the same standard code.
        - Always follow the exact mappings implied by the metadata labels.

      7. **Time-Invariant vs Time-Varying Characteristics**:
        - For time-invariant or stable characteristics (for example sex, ethnicity, language, parental education):
          - create a single consolidated variable
          - prioritise the earliest valid substantive response when that characteristic is expected to be established early
          - if no positive values exist, use missing codes as fallback in a consistent order
        - For time-varying characteristics (for example sexual orientation, relationship status, employment, economic activity, geographical location, NS-SEC, housing tenure):
          - retain age-specific variables rather than creating a single consolidated measure
          - preserve temporal variation for longitudinal analysis

      8. **Factor Variables and Labels**:
        - When recoding categorical variables, use factor variables with explicit labels for both valid categories and missing-value codes.
        - For continuous variables (for example income or deprivation scores), use labels only for missing codes when needed.

      9. **Package Requirements**:
        - Use only standard R packages: `haven`, `dplyr`, `purrr`, `labelled`, `readr`.
        - Load packages at the start of the script using `library()`.

      10. **Output Requirements**:
        - Your R script must output one single cleaned CSV named `data/output/cleaned_data.csv`.
        - Use `write_csv()` or `write.csv(..., row.names = FALSE)`.

      11. **Variables to Include in Output**:
        - Include the ID variable from the source data.
        - Explicitly output only the derived variables created during cleaning and harmonization.
        - Do NOT include raw source variables.
        - Do NOT include intermediate wave-specific variables unless they are part of the final required output.

      12. **Execution**:
        - You must run your R script after generating it.
        - If the script fails, inspect the error, fix it, and try again rather than returning a failed script.

      Produce your script in R.
      {append}
      Here is the appropriate metadata for the task:

      {metadata}
