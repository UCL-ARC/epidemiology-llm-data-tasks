task_id: 1
task_type: data_cleaning_r
override: |
  You have access to raw survey datasets on a cohort study followed up at multiple ages. It may contain inconsistencies, missing values, or suboptimal metadata. Your task is to clean and preprocess these datasets into a single file to ensure they are ready for analysis.
  
  Follow all instructions precisely:

  1. **File Loading**:
     - Ensure when you load the input files you append the dir "data/input/" this is where they are stored.
     - Load each dataset into a separate object and merge using full_join by the ID variable.
     - The input files are tab-delimited (.tab) text files. Use `readr::read_delim()` with `delim = "\t"` to load them. 
     - Load each file explicitly by name from the metadata.
     - Load ALL datasets listed in the metadata, even if they contain only the ID variable. All files are needed to construct the complete cohort member frame via full_join.

  2. **Variable Naming Conventions**:
     - Use the exact ID variable name from source data (e.g., NSID) - do NOT create or rename to generic "id".
     - All variable names must be short, descriptive, and lowercase.
     - For final age-specific OUTPUT variables: append only the age as numeric suffix (e.g., educaim17, educaim19, educaim20, educaim25, educaim32).

  3. **Standard Missing-Value Codes**:
     Use these codes for ALL variables:
     - -9 = Refusal
     - -8 = Don't know/insufficient information
     - -1 = Item not applicable
     - -3 = Not asked at the fieldwork stage/participated/interviewed
     - -2 = Schedule not applicable/Script error/information lost
     - NEVER collapse different missing-value meanings into the same code unless metadata explicitly says so.
     - Any Null value to be coded as -3 (Not asked at the fieldwork stage/participated/interviewed) to distinguish from explicit missing codes.

  4. **Response Category Harmonization**:
     - When the SAME construct is measured across ages with DIFFERENT response categories, harmonize them into a common multi-category coding scheme.
     - Create age-specific variables (educaim17, educaim19, educaim20, educaim25, educaim32) that ALL use the SAME ordered conceptual categories:
       * 0 = NVQ 4–5 (higher/HE level): Doctorate, Masters, Undergraduate/First degree, Diplomas in HE, Other HE, PGCE, Teaching quals, Nursing quals, HNC/HND, NVQ 4, NVQ 5, Professional qualifications at degree level
       * 1 = NVQ 1–3 (lower/mid level): A/AS levels, AVCE, GCSE, NVQ 1, NVQ 2, NVQ 3, Intermediate/Foundation GNVQ, Other level 1/2/3, Apprenticeships, BTEC, City & Guilds, Key Skills, RSA, Scottish equivalents
       * 2 = None/entry level: Entry level qualifications, Basic skills
       * 3 = Other: "Other" or "level unknown" qualifications
       * 4 = None of these qualifications
       * 5 = Not studying
     - Note: at age 17 there are NO NVQ 4–5 options — all substantive codes are NVQ 1–3.
     - Note: the numeric codes for the same qualification DIFFER across waves (e.g., NVQ 1 = code 9 at age 17 but code 1 at age 20). Always classify by the qualification LABEL, not the numeric code.
     - Do NOT collapse all substantive responses into only one or two categories.
     - Preserve as much conceptual detail as possible while maintaining comparability across ages.

  5. **Recoding Logic (STRICT METADATA COMPLIANCE)**:
     - Follow the EXACT value label mappings from metadata for EACH wave.
     - Explicitly map original codes into the six harmonized substantive categories (0–5) plus missing codes.
     - Convert wave-specific missing codes using metadata mappings (e.g., -94 → -2, -91 → -1, -8 → -8, -9 → -9).
     - NEVER map all negative values to a single missing category.

  6. **Complex Multi-Variable Derivation**:
     - Later waves (e.g., ages 25 and 32) must use BOTH:
       * Economic activity/education participation variables (e.g., W8ACTIVITY05, W9ECONACT2)
       * AND multiple qualification indicator variables
     - Always:
       1) First determine whether the respondent is currently studying using the activity variable.
       2) If not studying, assign category 5 = Not studying.
       3) If studying, classify into categories 0–4 using ALL relevant academic and vocational indicators listed in the metadata.
     - Use ALL qualification indicators mentioned in the metadata (both academic and vocational).
     - Correctly distinguish higher-level vs mid-level aims (NVQ 4–5 vs NVQ 1–3).
     - Explicitly handle "none", "other", "don't know", and "refused" indicators.

  7. **Data Structure**:
     - Select needed variables from each wave dataset into separate objects (S4, S6, S7, S8, S9, etc.).
     - For complex waves: include activity variables PLUS all qualification indicator variables listed in metadata.

  8. **Recoding Logic Structure**:
     - For teenage waves: map into ALL six harmonized categories (0–5), not just "studying vs not studying".
     - For adult waves: implement full two-stage logic (activity → qualification indicators).

  9. **Package Requirements**:
     - Use ONLY standard R packages: haven, dplyr, purrr, labelled, readr.
     - Load packages at the start of the script using library().

  10. **Output Requirements**:
      - Your R script must output one single cleaned csv named data/output/cleaned_data.csv using write_csv().

  11. **Variables to Include in Output**:
      - Keep only: NSID + all final harmonized age-specific variables.
      - Example: `select(NSID, educaim17, educaim19, educaim20, educaim25, educaim32)`
      - Do NOT include any raw or source variables.

  12. **Critical Distinctions**:
      - This is a HARMONIZATION task:
        * Create MULTIPLE age-specific variables.
        * All must use the SAME conceptual categories and coding scheme.
        * Do NOT consolidate into a single variable.

  13. **Handling ALL Waves**:
      - Process ALL waves mentioned in the metadata.
      - Adult waves must be harmonized to the same six-category scale as teenage waves.

  14. **Execution**:
      - You must run your R script after generating it.

  Produce your script in R.

  Here is the appropriate metadata for the task:

  {metadata}