task_type: data_cleaning_r_plus
additional_requirements: |
  Derive four educational qualification variables: educ25 and educ32 (collapsed 5-level NVQ scheme), educadtl32 (detailed academic qualifications at age 32), and educvdtl32 (detailed vocational qualifications at age 32).
  Collapsed 5-level NVQ scheme for educ25 and educ32 (both must share identical factor structures, codes, and labels):
    0 = NVQ 4–5 equivalent
    1 = NVQ 1–3 equivalent
    2 = Entry level or no qualifications
    3 = Other qualifications not mappable to the NVQ framework
    4 = None of these qualifications
  Derivation logic for educ25: combine the derived academic NVQ variable W8DHANVQH with the W8VCQU* vocational tick-box variables; use the metadata labels to classify each W8VCQU* to its NVQ tier; where sources indicate different tiers, retain the highest valid qualification; route the dedicated Don't know and Refused vocational tick-boxes to -8 and -9 respectively.
  Derivation logic for educ32: combine W9DANVQH and W9DVNVQH; where both are present, retain the higher level; a missing code in one source must not override a valid qualification from the other; preserve the actual negative code from the source variable rather than collapsing all missing cases to -3.
  Derivation logic for educadtl32: scan the W9ACQU* academic tick-box variables in metadata order; assign integer code 1 for the first substantive indicator, code 2 for the next, and so on; when all substantive indicators are No (2), assign the "None of these qualifications" code (the integer after the last substantive code); the three non-substantive tick-boxes (Don't know, Refused, No answer) map to -8, -9, and -2 respectively; all indicators -1 → -1; all missing or -3 → -3. After the integer coding, convert to a factor whose levels are the substantive integers plus the applicable missing codes, and whose labels are the qualification descriptions taken from the metadata variable_label field with the prefix "Academic qualifications gained - " stripped, plus standard labels for the missing codes.
  Derivation logic for educvdtl32: identical logic applied to W9VCQU*, but only Don't know and Refused apply as non-substantive tick-boxes (no No-answer indicator exists for vocational qualifications); strip the prefix "Vocational qualifications gained - " from variable_label when deriving factor labels.
additional_requirements_lite: |
  Derive educational qualification variables named educ25, educ32 (5-level NVQ scheme), educadtl32 (detailed academic qualifications), and educvdtl32 (detailed vocational qualifications) at ages 25 and 32.

override: |
  You have access to raw survey datasets from a longitudinal cohort study followed across multiple waves. 
  Your task is to clean and harmonise educational qualification variables only and produce a single cleaned file ready for analysis.

  Follow all instructions exactly.

  1. **File Loading**:
     - Ensure when you load the input files you append the dir "data/input/" this is where they are stored.
     - Load each dataset into a separate object and merge using full_join by the ID variable.
     - The input files are tab-delimited (.tab) text files. Use `readr::read_delim()` with `delim = "\t"` to load them. 
     - Load each file explicitly by name from the metadata.

  2. **Packages**:
     - Use ONLY the following standard R packages: `haven`, `dplyr`, `purrr`, `labelled`, `readr`.

  3. **Variables to Derive**:
     Derive exactly four variables and no others:
     - `educ25`: Collapsed NVQ level at age ~25 (wave 8)
     - `educ32`: Collapsed NVQ level at age ~32 (wave 9)
     - `educadtl32`: Detailed academic qualifications at age 32 (wave 9)
     - `educvdtl32`: Detailed vocational qualifications at age 32 (wave 9)

  4. **Requirements for educ25 (Age 25 NVQ Level)**:
     - Source:
       * Combine BOTH:
         - the derived academic NVQ variable `W8DHANVQH`, AND
         - individual vocational qualification responses `W8VCQU*` variables from wave 8.
     - Purpose:
       * Create a single comprehensive measure capturing the highest qualification level from either academic or vocational routes.
     - Output:
       * 5-level collapsed categorical variable coded `0–4`:
         - `0`: NVQ 4–5 equivalent qualifications
         - `1`: NVQ 1–3 equivalent qualifications
         - `2`: Entry level or no qualifications
         - `3`: Other qualifications not mappable to NVQ framework
         - `4`: None of these qualifications
     - Rules:
       * Preserve standard missing codes (`-9`, `-8`, `-3`, `-2`, `-1`) explicitly as factor levels.
       * Any Null value to be coded as -3 to distinguish from explicit missing codes.
       * When multiple indicators are present, always prioritise the highest valid qualification observed across ALL sources.
       * Treat academic and vocational routes as equally valid inputs.
       * Individual vocational tick-box variables must be classified to the correct NVQ tier using the variable_label in the metadata — e.g., "NVQ/SVQ - Level 3 - 5" and "HNC/HND" are NVQ 4–5 level, NOT NVQ 1–3. Do NOT treat all vocational qualifications as the same level.

  5. **Requirements for educ32 (Age 32 NVQ Level)**:
     - Source:
       * Combine BOTH derived NVQ variables from wave 9:
         - Academic: `W9DANVQH`
         - Vocational: `W9DVNVQH`
     - Purpose:
       * Create a single comprehensive measure of highest qualification from either route.
     - Output:
       * Use the SAME 5-level collapsed scheme as `educ25` with IDENTICAL coding and labels.
     - Rules:
       * Use inclusive OR logic: if either route shows a qualification, capture it.
       * When both routes are present, retain the higher of the two qualification levels.
       * If one route has a valid qualification but the other has a missing code, use the valid qualification — do NOT let a missing code override a valid response.
       * Preserve standard missing codes as explicit factor levels.

  6. **Requirements for educadtl32 (Academic Qualification Detail)**:
     - Source:
       * `W9ACQU*` variables (mutually exclusive binary indicators for academic qualifications).
     - Purpose:
       * Identify the single academic qualification type held by each respondent.
     - Output:
       * A single categorical variable where each value is the human-readable `variable_label` text from the metadata (e.g., "Doctorate or equivalent", "Masters or equivalent"), NOT the variable name (e.g., NOT "W9ACQU0A").
     - Logic:
       * Each respondent should have at most ONE `"Yes"` (`=1`) across all `W9ACQU*` variables.
       * Scan across all `W9ACQU*` variables in priority order and select the FIRST valid positive response.
       * Map the selected variable to its full descriptive label from the metadata `variable_label` field, stripping the common prefix (e.g., "Academic qualifications gained - Doctorate or equivalent" → "Doctorate or equivalent").
       * If ALL responses are `"No"` (`=2`), code as `"None of these qualifications"`.
       * Preserve `"Don't know"`, `"Refused"`, and `"No answer"` as missing codes.
       * Handle `"Not applicable"` and `"Not asked"` appropriately without recoding them to valid responses.

  7. **Requirements for educvdtl32 (Vocational Qualification Detail)**:
     - Source:
       * `W9VCQU*` variables (mutually exclusive binary indicators for vocational qualifications).
     - Purpose:
       * Identify the single vocational qualification type held by each respondent.
     - Output:
       * A single categorical variable where each value is the human-readable `variable_label` text from the metadata (e.g., "Professional qualifications at degree level", "Nursing or other medical qualifications"), NOT the variable name.
     - Logic:
       * Same logic as `educadtl32`, but applied to vocational qualifications.
       * Scan across all `W9VCQU*` variables in priority order.
       * Map `"Yes"` responses to descriptive labels from the metadata `variable_label` field, stripping the common prefix.
       * If all responses are `"No"`, code `"None of these qualifications"`.
       * Preserve all missing and special codes.

  8. **General Data Quality Rules**:
     - For collapsed NVQ variables (`educ25`, `educ32`):
       * When multiple data sources indicate different levels, ALWAYS retain the highest valid level.
     - For ALL variables:
       * Preserve the full range of missing data codes to maintain provenance.
       * Return variables as labelled factors with explicit level ordering.
     - Consistency:
       * `educ25` and `educ32` must have IDENTICAL factor structures, codes, and labels.

  9. **Final Output Requirements**:
     - Final dataset must contain EXACTLY these 5 variables and no others:
       * `NSID`, `educ25`, `educ32`, `educadtl32`, `educvdtl32`
     - Write output to: `data/output/cleaned_data.csv`

  10. **Execution Requirement**:
      - You must run your R script after creating it to verify it executes successfully.
      - IMPORTANT: If your R script fails, read the error message carefully, fix the script, and try again. Never return an error message as your final answer.

  Produce your script in R.

  Here is the appropriate metadata for the task:

  {metadata}
override_lite: |
  You have access to raw survey datasets from a longitudinal cohort study followed across multiple waves. 
  Your task is to clean and harmonise educational qualification variables only and produce a single cleaned file ready for analysis.

  Follow all instructions exactly.

  1. **File Loading and Merging**:
     - When loading input files, always prepend the directory `data/input/`.
     - Load all data files listed in the metadata.
     - For each file, select `NSID` plus all education-related variables shown in the metadata.
     - Merge all datasets using `full_join` by `NSID` to create a single analytical dataset.

  2. **Packages**:
     - Use ONLY the following standard R packages: `haven`, `dplyr`, `purrr`, `labelled`, `readr`.

  3. **Variables to Derive**:
     Derive exactly four variables and no others:
     - `educ25`: Collapsed NVQ level at age ~25 (wave 8)
     - `educ32`: Collapsed NVQ level at age ~32 (wave 9)
     - `educadtl32`: Detailed academic qualifications at age 32 (wave 9)
     - `educvdtl32`: Detailed vocational qualifications at age 32 (wave 9)

  4. **Collapsed NVQ Variables (educ25, educ32)**:
     - Combine academic and vocational sources to determine the single highest qualification level.
     - For wave 8: use the derived academic NVQ variable AND individual vocational tick-box indicators.
     - For wave 9: use both derived NVQ summary variables (academic and vocational).
     - Output a 5-level collapsed scheme:
       * `0`: NVQ 4–5 equivalent
       * `1`: NVQ 1–3 equivalent
       * `2`: Entry level or no qualifications
       * `3`: Other qualifications
       * `4`: None of these qualifications
     - When classifying individual tick-box indicators, use the variable_label from the metadata to determine which NVQ tier each qualification belongs to.
     - A valid qualification from either route always takes precedence over a missing code from the other route.
     - Both variables must have identical factor structures, codes, and labels.
     - Preserve standard missing codes (`-9`, `-8`, `-3`, `-2`, `-1`) as explicit factor levels.

  5. **Detailed Qualification Variables (educadtl32, educvdtl32)**:
     - Source from the binary indicator variables (`W9ACQU*` for academic, `W9VCQU*` for vocational).
     - For each respondent, identify which specific qualification they hold.
     - Output values must be human-readable descriptive labels derived from the metadata (e.g., "Doctorate or equivalent"), not raw variable names or numeric codes.
     - If all indicators are "No", code as "None of these qualifications".
     - Preserve missing and special codes (Don't know, Refused, Not applicable, Not asked, No answer).

  6. **General Data Quality Rules**:
     - Always retain the highest valid qualification when multiple sources disagree.
     - Preserve the full range of missing data codes.
     - Return all variables as labelled factors.

  7. **Final Output Requirements**:
     - Final dataset must contain exactly: `NSID`, `educ25`, `educ32`, `educadtl32`, `educvdtl32`
     - Write output to: `data/output/cleaned_data.csv`

  8. **Execution Requirement**:
     - You must run your R script after creating it to verify it executes successfully.

  Produce your script in R.

