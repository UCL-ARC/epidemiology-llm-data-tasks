task_id: 1
task_type: data_cleaning_r
override: |
  You have access to raw survey datasets from a longitudinal cohort study. Your task is to clean and harmonise household weekly income variables measured at multiple ages and output a single cleaned dataset.

  Follow all instructions:

  1. **File Loading**:
     - Ensure when you load the input files you append the dir "data/input/" this is where they are stored.
     - Load each dataset into a separate object and merge using full_join by the ID variable.
     - The input files are tab-delimited (.tab) text files. Use `readr::read_delim()` with `delim = "\t"` to load them. 
     - Load each file explicitly by name from the metadata.
     
  2. **Variable Naming Conventions**:
     - Use the exact ID variable name from source data (NSID).
     - Use short, descriptive, lowercase variable names with age suffixes:
       * incwhh14, incwhh15, incwhh16, incwhh17 for banded income
       * incwhhcnt14, incwhhcnt15 for continuous income

  3. **Standard Missing-Value Codes**:
     Use these codes for ALL variables:
     - -9 = Refusal
     - -8 = Don't know/insufficient information
     - -1 = Item not applicable
     - -3 = Not asked/interviewed
     - -2 = Script error/lost
     - Any Null value to be coded as -3 (Not asked at the fieldwork stage/participated/interviewed) to distinguish from explicit missing codes.
     - Map all wave-specific missing codes to these standards.
     - Be careful to handle missing values separately from valid data when deriving new variables.

  4. **Missing Value Code Harmonization**:
     - Recode all wave-specific negative codes and NAs to the standard missing scheme.
     - When deriving banded variables from continuous income, handle missing values first (preserving their codes), then apply banding logic only to valid positive values.
     - Note: the wave-specific code -3 ("Not yet paid", present in age 14 and 15 waves) is NOT                                                                                                                       
       equivalent to the standard -3. Map it to -1 (Item not applicable), as income is not                                                                                                                           
       applicable when payment has not yet been received.                                                                                                                                                            
     - Note: the wave-specific code -996 ("No parent in household", present in age 17 wave)                                                                                                                          
       should be mapped to -3 (Not asked/interviewed). 

  5. **Waves with Continuous Income (ages 14 and 15)**:
     - Derive categorical income bands based on realistic weekly household income thresholds.
     - Banded variables should include both valid income categories AND missing value categories as factor levels.
     - Retain both versions: banded (as factor) and continuous (original values with missing codes labeled).
     - The banding scheme for ages 14-15 may differ from the scheme used at ages 16-17.

  6. **Waves Already Collected as Categorical Bands (ages 16 and 17)**:
     - Retain as factors with the original survey category labels.
     - Note that these use different banding schemes than ages 14-15.

  7. **Factor Variables and Labels**:
     - Banded variables: factors with levels covering both income categories (1, 2, 3...) AND missing codes (-9, -8, -3, -2, -1), with descriptive labels for all levels.
     - Continuous variables: labelled numeric preserving original continuous values, with labels only for missing codes.

  8. **Scope Restrictions**:
     - Do not create a consolidated income measure across waves.

  9. **Package Requirements**:
     - Use ONLY standard R packages: haven, dplyr, purrr, labelled, readr.
     - Load packages at the start of the script using library().

  10. **Output Requirements**:
      - Output only the following variables:
        * NSID
        * incwhh14, incwhh15, incwhhcnt14, incwhhcnt15
        * incwhh16, incwhh17
      - Write exactly one CSV file named data/output/cleaned_data.csv.

  11. **Execution**:
      - You must run your R script after generating it.
      - IMPORTANT: If your R script fails, read the error message carefully, fix the script, and try again. Never return an error message as your final answer.

  Produce your script in R.
  
  Here is the appropriate metadata for the task:

  {metadata}